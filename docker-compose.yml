# Mood Tracker — production compose (behind shared Traefik on network `web`).
# No published ports: Traefik is the only ingress. Route comes from labels.
services:
  api:
    build: .
    # SHA-tagged in CI (IMAGE_TAG=<git-sha>) so rollback = redeploy a prior tag;
    # defaults to :local for manual/dev builds. See docs/07-deployment.md §Rollback.
    image: moodtracker-api:${IMAGE_TAG:-local}
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - web
      - default
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.moodtracker.rule=Host(`moodaitracker.shop`)"
      - "traefik.http.routers.moodtracker.entrypoints=websecure"
      - "traefik.http.routers.moodtracker.tls.certresolver=le"
      - "traefik.http.routers.moodtracker.service=moodtracker"
      - "traefik.http.services.moodtracker.loadbalancer.server.port=8000"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - default            # internal only — never exposed to `web`/Traefik
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  web:
    external: true
  default:

volumes:
  pgdata:
